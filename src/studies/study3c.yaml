    maxLabel: "Insincere"
  - id: upstanding_disreputable
    label: "Upstanding vs Disreputable"
    questionTemplate: "To what extent would it make sense for {category} to portray itself as more **\"Upstanding\"** or more **\"Disreputable\"**?"
