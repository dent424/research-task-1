study:
  id: study3c
  title: Study 3c

comprehensionChecks:
  - id: brand-personality
    definition: |
      Just as people have personality traits, brands and product categories
      can also be described in terms of personality. These personalities
      are often captured by pairs of opposing traits — for example, a
      luxury fashion brand might come across as more "sophisticated" than
      "casual," while a toy company might come across as more "playful"
      than "serious."
    question: "Based on the description above, which of the following best describes brand personality?"
    options:
      - text: "A brand's financial performance and market share"
        correct: false
      - text: "How a brand or product category is positioned between opposing personality traits"
        correct: true
      - text: "The personal opinions of a brand's CEO"
        correct: false
      - text: "The number of employees at a company"
        correct: false
    retryMessage: "That's not quite right. Please re-read the description and try again."
    maxAttempts: 2
    kickWarning: "That's not quite right. Please re-read the description carefully. If you answer incorrectly again, you will be asked to return the submission."

instructions: |
  In this study, you will rate 16 brands on two pairs of
  opposing personality traits.

  For each trait pair, you will rate where it would make sense
  for each brand to fall on a 7-point scale between the two
  opposing traits (for example, from "Fun" on one end to
  "Serious" on the other).

  If you are not familiar with a brand, click "I'm not familiar with this brand" instead of selecting a rating.

