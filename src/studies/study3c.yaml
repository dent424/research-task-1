dependentVariables:
  - id: fun_serious
    label: "Fun vs Serious"
    questionTemplate: "To what extent would it make sense for {category} to portray itself as more **\"Fun\"** or more **\"Serious\"**?"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Fun"
    maxLabel: "Serious"
  - id: establishment_rebellion
    label: "Establishment vs Rebellion"
    questionTemplate: "To what extent would it make sense for {category} to portray itself as more **\"Establishment\"** or more **\"Rebellion\"**?"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Establishment"
    maxLabel: "Rebellion"
  - id: earnest_insincere
    label: "Earnest vs Insincere"
    questionTemplate: "To what extent would it make sense for {category} to portray itself as more **\"Earnest\"** or more **\"Insincere\"**?"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Earnest"
    maxLabel: "Insincere"
  - id: upstanding_disreputable
    label: "Upstanding vs Disreputable"
    questionTemplate: "To what extent would it make sense for {category} to portray itself as more **\"Upstanding\"** or more **\"Disreputable\"**?"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Upstanding"
    maxLabel: "Disreputable"

design:
  type: between-subjects
  categoryOrder: randomized
  dvBlocking: randomized
  showUnfamiliarOption: true
  blockIntroTemplate: "You will now rate the extent to which it would make sense for each brand to portray itself as **\"{trait}\"**."
  transitionText: "Now you will rate the extent to which it would make sense for each brand to portray itself as **\"{trait}\"**."

