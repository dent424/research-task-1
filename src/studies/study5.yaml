# Study 5 — Brand Cringe: person vs. company (2-cell between-subjects)
#
# An anonymous PERSON vs. an anonymous COMPANY posts the SAME text. Prediction:
# the identical post cringes more from the company (persuasion knowledge + higher
# expectations). The post is presented as a SCENARIO (no social-media chrome);
# the only difference between cells is the actor phrase in the framing
# ("a person you don't know" vs "a brand you are not familiar with").
#
# Fully between-subjects: 2 actors x 5 posts = 10 cells.
#   - actor: `cond` URL param (0 = person, 1 = company); invalid/absent -> random
#   - post:  `post` URL param indexes `stimuli`; invalid/absent -> random
# Both are recorded with *FromUrl flags; assignment persists across refresh.

study:
  id: study5
  title: Study 5

# No comprehension check (cringe is not defined for participants).
comprehensionChecks: []

instructions: |
  On the next screens you will read a short social media post and answer a few
  questions about it. There are no right or wrong answers — we are interested in
  your honest reactions.

# Scenario framing shown above the post on every rating page.
# {actorPhrase} -> the cell's actorPhrase (article included).
scenarioTemplate: "Imagine you are scrolling through social media and you see a post from **{actorPhrase}**:"

# Each participant is assigned ONE post (the `post` URL param indexes this list;
# absent/invalid falls back to a random post). The assigned post id is recorded.
stimuli:
  - id: iconic
    text: "not us being kind of iconic today 💅"
  - id: blessed
    text: "feeling so blessed today honestly 🥹"
  - id: reminder
    text: "reminder: you're exactly where you're meant to be 🌱"
  - id: monday
    text: "POV: it's monday and you're already done 😭"
  - id: trust
    text: "trust the process. it's all coming together 🙏"

# cond = index into this list. 0 = person, 1 = company.
conditions:
  - key: person
    actorNoun: person
    actorNounPlural: people
    actorPhrase: "a person you don't know"
  - key: company
    actorNoun: company
    actorNounPlural: companies
    actorPhrase: "a brand you are not familiar with"

design:
  type: single-stimulus
  # cringe (dependentVariables[0]) shows first; the rest are randomized, one per page.
  dvOrderStrategy: first-pinned-rest-randomized

# All 7-point scales. {actor} is replaced by the cell's actorNoun (person/company)
# and {actors} by its actorNounPlural (people/companies) so process items are
# parallel-worded and differ only by the actor noun.
dependentVariables:
  # --- Primary DV (pinned first) ---
  - id: cringe
    label: cringe
    questionTemplate: 'How **cringe** is this post?'
    scaleMin: 1
    scaleMax: 7
    minLabel: "Not at all"
    maxLabel: "Extremely"

  # --- Reactions ---
  - id: authentic
    label: authentic
    questionTemplate: "How authentic does this post feel?"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Not at all authentic"
    maxLabel: "Extremely authentic"
  - id: liking
    label: liking
    questionTemplate: "How much do you like this post?"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Dislike a great deal"
    maxLabel: "Like a great deal"
  # Semantic differential about the POSTER (not the post), from Campbell &
  # Kirmani (2000) 4-item sincerity scale (sincere/insincere, honest/dishonest,
  # not manipulative/manipulative, not pushy/pushy; alpha = .87, JCR 27(1),
  # p. 73). We use only the insincere-sincere item. PDF in
  # Literature/Campbell-Kirmani-ConsumersUseOfPersuasionKnowledge-2000.pdf
  - id: sincere
    label: sincere
    questionTemplate: "Whoever posted this seems:"
    scaleMin: 1
    scaleMax: 7
    minLabel: "Insincere"
    maxLabel: "Sincere"

  # --- Persuasion-knowledge scale (mechanism 1) ---
  # pk_persuade and pk_motive adapted from Campbell & Kirmani (2000),
  # "Consumers' Use of Persuasion Knowledge", JCR 27(1), 69-83. PDF in
  # Literature/Campbell-Kirmani-ConsumersUseOfPersuasionKnowledge-2000.pdf
  # Originals: "While I read the story, I thought it was pretty obvious that
  # Pat was trying to persuade the customer" (p. 75) and "Pat had an ulterior
  # motive for saying the jacket looked good" (p. 77); both 7-pt
  # strongly disagree - strongly agree.
  - id: pk_persuade
    label: persuasion-knowledge (persuade)
    questionTemplate: "It is pretty obvious that whoever posted this is trying to persuade me."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"
  - id: pk_motive
    label: persuasion-knowledge (motive)
    questionTemplate: "Whoever posted this has an ulterior motive for posting it."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"
  - id: pk_ad
    label: persuasion-knowledge (ad)
    questionTemplate: "This post is basically marketing or an advertisement."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"

  # --- Higher-expectations scale (mechanism 2) ---
  - id: expect_better
    label: expectations (better)
    questionTemplate: "I expect better from this {actor}."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"
  - id: expect_standard
    label: expectations (standard)
    questionTemplate: "I hold {actors} to a higher standard than this post."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"

  # --- Earnestness / effort appraisal (the "earnest fail" construct) ---
  - id: earnest_genuine
    label: earnestness (genuine)
    questionTemplate: "Whoever posted this is genuinely, earnestly trying."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"
  - id: earnest_toohard
    label: earnestness (trying too hard)
    questionTemplate: "Whoever posted this is trying too hard."
    scaleMin: 1
    scaleMax: 7
    minLabel: "Strongly disagree"
    maxLabel: "Strongly agree"

# Shown AFTER the full DV battery so it does not prime the DVs.
manipulationCheck:
  question: "Thinking back to the post you just rated, who posted it?"
  options:
    - "An individual person"
    - "A company or brand"

demographics:
  age:
    label: "What is your age?"
    placeholder: "Enter your age"
  gender:
    label: "What is your gender?"
    options:
      - "Man"
      - "Woman"
      - "Non-binary"
      - "Prefer not to say"

qualtricsReturnUrl: "https://uic.ca1.qualtrics.com/jfe/form/SV_cIPzXiCI1OETxKS"
